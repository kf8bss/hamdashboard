<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central OH Alerts</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&family=Victor+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --border:      #30363d;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --extreme:     #ff4444;
      --severe:      #ff8c00;
      --moderate:    #ffd700;
      --minor:       #4a9eff;
      --clear:       #3fb950;
      --extreme-bg:  rgba(255, 68,  68,  0.12);
      --severe-bg:   rgba(255,140,   0,  0.12);
      --moderate-bg: rgba(255,215,   0,  0.12);
      --minor-bg:    rgba( 74,158, 255,  0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title {
      font-family: 'Victor Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .refresh-time {
      font-family: 'Victor Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .region {
      margin-bottom: 8px;
    }
    .region-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 4px 0 0;
      margin-bottom: 1px;
    }
    .region-label {
      font-family: 'Victor Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .region-count {
      font-family: 'Victor Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      border: 1px solid;
    }
    .count-clear   { color: var(--clear);    border-color: var(--clear);    background: rgba(63,185,80,0.1); }
    .count-active  { color: var(--moderate); border-color: var(--moderate); background: rgba(255,215,0,0.1); }
    .count-severe  { color: var(--severe);   border-color: var(--severe);   background: rgba(255,140,0,0.1); }
    .count-extreme { color: var(--extreme);  border-color: var(--extreme);  background: rgba(255,68,68,0.1); }
    .alert-card {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 8px;
      border-left: 3px solid;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: var(--surface);
    }
    .alert-card:last-child {
      border-radius: 0 0 4px 4px;
    }
    .alert-card.extreme  { border-left-color: var(--extreme);  background: var(--extreme-bg); }
    .alert-card.severe   { border-left-color: var(--severe);   background: var(--severe-bg);  }
    .alert-card.moderate { border-left-color: var(--moderate); background: var(--moderate-bg);}
    .alert-card.minor    { border-left-color: var(--minor);    background: var(--minor-bg);   }
    .alert-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .extreme  .alert-dot { background: var(--extreme); box-shadow: 0 0 4px var(--extreme); }
    .severe   .alert-dot { background: var(--severe);  box-shadow: 0 0 4px var(--severe);  }
    .moderate .alert-dot { background: var(--moderate);box-shadow: 0 0 4px var(--moderate);}
    .minor    .alert-dot { background: var(--minor);   box-shadow: 0 0 4px var(--minor);   }
    .alert-body { flex: 1; min-width: 0; }
    .alert-event {
      font-weight: 700;
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .extreme  .alert-event { color: var(--extreme); }
    .severe   .alert-event { color: var(--severe);  }
    .moderate .alert-event { color: var(--moderate);}
    .minor    .alert-event { color: var(--minor);   }
    .alert-counties {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .alert-timing {
      font-family: 'Victor Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    .no-alerts {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 0 0 4px 4px;
      background: var(--surface);
      color: var(--clear);
      font-family: 'Victor Mono', monospace;
      font-size: 11px;
    }
    .no-alerts-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--clear);
      box-shadow: 0 0 4px var(--clear);
      flex-shrink: 0;
    }
    .error-card {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 0 0 4px 4px;
      background: var(--surface);
      color: var(--muted);
      font-family: 'Victor Mono', monospace;
      font-size: 10px;
    }
    .error-card span { color: var(--severe); }
    .loading {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 0 0 4px 4px;
      background: var(--surface);
      color: var(--muted);
      font-family: 'Victor Mono', monospace;
      font-size: 10px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">📡 Central OH — NWS Alerts</span>
  <span class="refresh-time" id="refresh-time">Loading…</span>
</div>
<div class="scroll-area" id="alerts-container"></div>

<script>
const REGIONS = [
  { short: 'FRANKLIN',  zones: ['OHC049'] },
  { short: 'DELAWARE',  zones: ['OHC041'] },
  { short: 'MARION',    zones: ['OHC101'] },
  { short: 'UNION',     zones: ['OHC159'] },
  { short: 'MADISON',   zones: ['OHC097'] }
];

const REFRESH_MS = 5 * 60 * 1000;

function getSeverityClass(severity, event) {
  const e = (event || '').toLowerCase();
  if (e.includes('tornado warning') || e.includes('flash flood emergency')) return 'extreme';
  if (severity === 'Extreme') return 'extreme';
  if (severity === 'Severe')  return 'severe';
  if (severity === 'Moderate')return 'moderate';
  return 'minor';
}

function getCountClass(alerts) {
  if (!alerts || alerts.length === 0) return 'count-clear';
  const classes = alerts.map(a => getSeverityClass(a.properties.severity, a.properties.event));
  if (classes.includes('extreme')) return 'count-extreme';
  if (classes.includes('severe'))  return 'count-severe';
  return 'count-active';
}

function fmtTime(iso) {
  if (!iso) return null;
  try {
    return new Date(iso).toLocaleTimeString('en-US', {
      hour: 'numeric', minute: '2-digit', hour12: true, timeZoneName: 'short'
    });
  } catch { return null; }
}

function fmtWindow(onset, ends, expires) {
  const end = ends || expires;
  const s = fmtTime(onset), e = fmtTime(end);
  if (s && e) return `${s} – ${e}`;
  if (e)      return `Until ${e}`;
  if (s)      return `From ${s}`;
  return '';
}

async function fetchAlerts(zones) {
  const url = `https://api.weather.gov/alerts/active?zone=${zones.join(',')}`;
  const res = await fetch(url, { headers: { 'User-Agent': 'KF8BSS-HamDashboard/1.0' } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const seen = new Set();
  return (data.features || []).filter(f => {
    if (seen.has(f.id)) return false;
    seen.add(f.id); return true;
  });
}

function renderRegion(region, alerts, error) {
  const countClass = error ? 'count-active' : alerts.length === 0 ? 'count-clear' : getCountClass(alerts);
  const countLabel = error ? '?' : alerts.length;

  let cardsHTML = '';
  if (error) {
    cardsHTML = `<div class="error-card"><span>⚠ NWS API unavailable</span> — retrying in 5 min</div>`;
  } else if (alerts.length === 0) {
    cardsHTML = `<div class="no-alerts"><div class="no-alerts-dot"></div>No active alerts</div>`;
  } else {
    const order = { extreme:0, severe:1, moderate:2, minor:3 };
    const sorted = [...alerts].sort((a,b) => {
      const ca = order[getSeverityClass(a.properties.severity, a.properties.event)] ?? 4;
      const cb = order[getSeverityClass(b.properties.severity, b.properties.event)] ?? 4;
      return ca - cb;
    });
    cardsHTML = sorted.map(f => {
      const p = f.properties;
      const cls = getSeverityClass(p.severity, p.event);
      const timing = fmtWindow(p.onset, p.ends, p.expires);
      return `
        <div class="alert-card ${cls}">
          <div class="alert-dot"></div>
          <div class="alert-body">
            <div class="alert-event">${p.event}</div>
            ${timing ? `<div class="alert-timing">${timing}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  return `
    <div class="region">
      <div class="region-header">
        <span class="region-label">${region.short} COUNTY</span>
        <span class="region-count ${countClass}">${countLabel}</span>
      </div>
      ${cardsHTML}
    </div>`;
}

async function refresh() {
  const container = document.getElementById('alerts-container');
  const timeEl = document.getElementById('refresh-time');

  if (container.innerHTML === '') {
    container.innerHTML = REGIONS.map(r => `
      <div class="region">
        <div class="region-header">
          <span class="region-label">${r.short} COUNTY</span>
          <span class="region-count count-active">…</span>
        </div>
        <div class="loading">Fetching…</div>
      </div>`).join('');
  }

  const results = await Promise.all(
    REGIONS.map(async r => {
      try {
        const alerts = await fetchAlerts(r.zones);
        return { region: r, alerts, error: null };
      } catch(err) {
        return { region: r, alerts: [], error: err.message };
      }
    })
  );

  container.innerHTML = results
    .map(r => renderRegion(r.region, r.alerts, r.error))
    .join('');

  timeEl.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', hour12: true
  });
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
<div id="dbl-overlay" style="
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 9999;
  background: transparent;
  pointer-events: none;
"></div>

<script>
  // Forward double-click to parent dashboard to trigger full-screen
  document.addEventListener('dblclick', function() {
    try { window.parent.postMessage('dblclick', '*'); } catch(e) {}
  });
</script>
</body>
</html>
