<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening...</title>
  <link href="https://fonts.googleapis.com/css2?family=Victor+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --blue:    #4a9eff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Victor Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }
    .icon { font-size: 32px; }
    .message {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .url {
      font-size: 11px;
      color: var(--blue);
      text-align: center;
      word-break: break-all;
      max-width: 400px;
    }
    .btn {
      margin-top: 8px;
      padding: 8px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--blue);
      font-family: 'Victor Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .btn:hover { border-color: var(--blue); }
  </style>
</head>
<body>
  <div class="icon">🔗</div>
  <div class="message">This site cannot be embedded.<br>Opening in a new tab…</div>
  <div class="url" id="url-display"></div>
  <a class="btn" id="manual-link" href="#" target="_blank">Open manually if not redirected</a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const target = params.get('url');

    if (target) {
      document.getElementById('url-display').textContent = target;
      document.getElementById('manual-link').href = target;
      // Open in new tab immediately
      window.open(target, '_blank');
    } else {
      document.querySelector('.message').textContent = 'No URL specified.';
      document.getElementById('url-display').textContent = '';
      document.getElementById('manual-link').style.display = 'none';
    }
  </script>
</body>
</html>
